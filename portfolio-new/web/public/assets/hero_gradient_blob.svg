<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#000000" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <circle cx="500" cy="500" r="400" fill="url(#grad)" filter="url(#blur)" />
  <circle cx="400" cy="400" r="300" fill="url(#grad)" filter="url(#blur)" opacity="0.6" />
</svg>
